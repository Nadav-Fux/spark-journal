<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0b0b1a">
  <title>Spark Log</title>
  <meta name="description" content="Spark Log — Personal engineering log tracking system operations, deployments, security events, and research insights.">
  <meta name="author" content="Nadav">
  <link rel="canonical" href="https://log.nvision.me">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://log.nvision.me">
  <meta property="og:title" content="Spark Log — Engineering Log">
  <meta property="og:description" content="Personal engineering log tracking system operations, deployments, security events, and research insights.">
  <meta property="og:site_name" content="Spark Log">

  <!-- Twitter/X Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Spark Log — Engineering Log">
  <meta name="twitter:description" content="Personal engineering log tracking system operations, deployments, security events, and research insights.">

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <a href="#main" class="skip-link">Skip to content</a>

  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" aria-hidden="true">
          <path d="M13 2L4.09 12.97A1 1 0 005 14.5h5.5l-1 7.5L19.91 11A1 1 0 0019 9.5h-5.5L13 2z" fill="#06b6d4" stroke="#8b5cf6" stroke-width=".5"/>
        </svg>
        <span class="logo-he">לוג ספארק</span>
        <span class="logo-en">Spark Log</span>
      </a>
      <div class="header-actions">
        <span id="count" class="count" title="Total entries">0</span>
        <button id="sort-btn" class="sort-btn" type="button" aria-label="↓ חדש">↓ חדש</button>
        <button id="lang-btn" class="lang-btn" type="button" aria-label="Switch to English">EN</button>
      </div>
    </div>
  </header>

  <nav class="section-nav" id="section-nav" aria-label="Sections">
    <button class="section-tab active" data-section="log" aria-pressed="true">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2 3h12M2 6.5h12M2 10h8M2 13.5h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      <span class="section-tab-he">לוג</span><span class="section-tab-en">Log</span>
    </button>
    <button class="section-tab" data-section="posts" aria-pressed="false">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M13 1H3a1 1 0 00-1 1v12a1 1 0 001 1h10a1 1 0 001-1V2a1 1 0 00-1-1zM5 5h6M5 8h6M5 11h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span class="section-tab-he">פוסטים</span><span class="section-tab-en">Posts</span>
    </button>
    <button class="section-tab" data-section="ideas" aria-pressed="false">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 1a5 5 0 013 9v1.5a1.5 1.5 0 01-1.5 1.5h-3A1.5 1.5 0 015 11.5V10a5 5 0 013-9zM6 14.5h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span class="section-tab-he">תוכניות עתידיות</span><span class="section-tab-en">Future Plans</span>
    </button>
  </nav>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <label for="search" class="sr-only">חיפוש רשומות</label>
      <input type="search" id="search" class="search-input" placeholder="חיפוש..." autocomplete="off">
      <nav id="cats" class="cat-nav" aria-label="Categories"></nav>
      <div id="tags" class="tag-cloud" role="list" aria-label="Tags"></div>
    </aside>

    <main class="main" id="main">
      <div id="filters" class="filters" hidden></div>
      <div id="cards" class="cards" aria-live="polite"></div>
      <div id="empty" class="empty" hidden>
        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" opacity=".3" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p class="empty-title">לא נמצאו רשומות</p>
        <p class="empty-sub">נסה לשנות את החיפוש או הפילטר</p>
      </div>
    </main>
  </div>

  <!-- Detail drawer -->
  <div id="drawer" class="drawer" hidden role="dialog" aria-modal="true" aria-labelledby="drawer-title">
    <div class="drawer-backdrop" id="drawer-backdrop"></div>
    <div class="drawer-panel" id="drawer-panel">
      <button id="drawer-close" class="drawer-close" type="button" aria-label="Close">&times;</button>
      <div id="drawer-head" class="drawer-head"></div>
      <div id="drawer-body" class="drawer-body"></div>
      <button id="drawer-scroll-top" class="drawer-scroll-top" type="button" aria-label="Scroll to top">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 12V4M4 7l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
